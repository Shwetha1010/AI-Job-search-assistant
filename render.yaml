# render.yaml — Render deployment configuration
# Two services: FastAPI backend + Streamlit frontend

services:
  # ── Service 1: FastAPI Backend ──────────────────────────────────────
  - type: web
    name: job-search-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
      - key: HF_HOME
        value: /tmp/hf_home

  # ── Service 2: Streamlit Frontend ───────────────────────────────────
  - type: web
    name: job-search-app
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip &&
      pip install streamlit>=1.35.0 requests>=2.31.0 python-dotenv>=1.0.0
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.fileWatcherType none
      --server.headless true
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
